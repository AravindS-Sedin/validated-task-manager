<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskOrbit | Advanced Task Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <span class="logo-icon">✨</span>
                <h1>TaskManager</h1>
            </div>
            <p class="subtitle">Manage your Tasks efficiently.</p>
        </header>

        <main>
            <section class="form-section">
                <div class="glass-card">
                    <form id="task-form">
                        <div class="form-group">
                            <label for="task-title">Task Title</label>
                            <input type="text" id="task-title" placeholder="What needs to be done?" autocomplete="off">
                            <div id="title-error" class="error-message"></div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="task-priority">Priority Level</label>
                                <select id="task-priority">
                                    <option value="High">High</option>
                                    <option value="Medium" selected>Medium</option>
                                    <option value="Low">Low</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="task-description">Description (Optional)</label>
                            <textarea id="task-description" rows="3" placeholder="Add some details..."></textarea>
                        </div>

                        <button type="submit" id="submit-btn" disabled>
                            <span class="btn-text">Create Task</span>
                            <span class="btn-loader"></span>
                        </button>
                    </form>
                </div>
            </section>

            <section class="list-section">
                <div class="list-header">
                    <h2>Active Tasks</h2>
                    <div class="task-count" id="task-count">0 Tasks</div>
                </div>
                <div id="task-list" class="task-list">
                    <!-- Tasks will be injected here -->
                    <div class="empty-state">
                        <div class="empty-icon">📂</div>
                        <p>No tasks yet.</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
